<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/cart.js" defer></script>
</head>
<body>
  <header>
    <h1>Корзина</h1>
    <a href="/" class="back-link">← Каталог</a>
  </header>

  <main style="max-width:1100px;margin:20px auto;padding:0 20px;">
    <div class="cart-layout">
      <section id="cartSection" class="cart-items-col">
        <div id="cartItems"></div>
      </section>

      <aside class="order-col">
        <div class="order-card">
          <h3>Итог</h3>
          <div class="order-total">Итого: <span id="cartTotal">0 грн</span></div>

          <h4 style="margin-top:14px;">Оформление заказа</h4>
          <form onsubmit="event.preventDefault(); submitCartOrder(this);">
            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="tel" name="phone" placeholder="Телефон" required>
            <input type="text" name="city" placeholder="Город">
            <input type="text" name="comment" placeholder="Комментарий">
            <button type="submit" class="order-btn">Оформить заказ</button>
          </form>
        </div>
      </aside>
    </div>
  </main>
</body>
</html>
